# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── H2 in-memory database (development) ─────────────────────
# Replace with a real datasource for production:
#   spring.datasource.url=jdbc:mysql://localhost:3306/smartcampus
#   spring.datasource.username=root
#   spring.datasource.password=secret
#   spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 console (http://localhost:8080/h2-console) ────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Logging ──────────────────────────────────────────────────
logging.level.com.smartcampus=DEBUG
