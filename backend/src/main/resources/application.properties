spring.application.name=smart-campus-hub
server.port=8080

# MongoDB Atlas
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=pafDB

# Disable SQL datasource
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
app.jwt.secret=${JWT_SECRET:SmartCampusHub2026SecretKeyForJWTTokenGenerationMustBe64CharsLongMinimum!}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Logging
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG