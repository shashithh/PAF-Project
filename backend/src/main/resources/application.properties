# ============================================================
# Smart Campus – Module A: Facilities & Assets Catalogue
# Application Configuration
# ============================================================

# ----- Server -----
server.port=8080

# ----- Database (MySQL) -----
# Update username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
# 'update' keeps existing data and alters schema as needed
# Change to 'create-drop' to start fresh every restart (dev only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- Data Initialization -----
# Runs data.sql on startup to seed sample data (only if tables are empty)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ----- Logging -----
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=DEBUG

# ----- Application name -----
spring.application.name=smart-campus-facilities

# OAuth2 Google Configuration (we'll fill this later)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# JWT Configuration
jwt.secret=smartcampus2026supersecretkey1234567890abcdefgh
jwt.expiration=86400000
