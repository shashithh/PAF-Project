spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.security.oauth2.client.registration.google.client-id=test-id
spring.security.oauth2.client.registration.google.client-secret=test-secret
app.jwt.secret=TestSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm
app.cors.allowed-origins=http://localhost:5173
